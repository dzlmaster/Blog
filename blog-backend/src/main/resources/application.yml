server:
  port: 8088
spring:
  profiles:
    active: dev
  security:
    jwt:
      key: jwt-key
      # jwt 的有效时间（天）
      expire: 7
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 替换：【服务器公网IP】、【你的MySQL密码】
    url: jdbc:mysql://localhost:3306/blog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: 19501215
  data:
    redis:
      # redis 端口（默认6379，不用改）
      port: 6379
      # 替换：【服务器公网IP】
      host: localhost
      # 替换：【你的Redis密码】
      password: 123456
      # redis连接超时时间（毫秒）
      timeout: 10000
      # 数据库索引，默认为0
      database: 1
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  rabbitmq:
    # 替换：【服务器公网IP】
    host: localhost
    # rabbitmq 端口（默认5672，不用改）
    port: 5672
    # 默认用户名是guest（如果没改的话，直接填guest）
    username: guest
    # 替换：【你修改后的RabbitMQ密码】
    password: 123456
    listener:
      simple:
        retry:
          enabled: true #是否开启消费者重试
          max-attempts: 3 #最大重试次数
          initial-interval: 6000 #重试间隔时间（单位毫秒）
          multiplier: 2 #间隔时间乘子，间隔时间*乘子=下一次的间隔时间，最大不能超过设置的最大间隔时间
          max-interval: 10000 #重试最大时间间隔（单位毫秒）
    # 邮箱队列名称（默认值，不用改）
    queue:
      email: email_queue
      log-login: log_login_queue
      log-system: log_system_queue
    # 邮箱交换机名称（默认值，不用改）
    exchange:
      email: email_exchange
      log: log_exchange
    # 邮箱路由键（默认值，不用改）
    routingKey:
      email: email_routing_key
      log-login: log_routing_key_login
      log-system: log_routing_key_system
  mail:
    # QQ邮箱SMTP服务器（不用改）
    host: smtp.qq.com
    # 替换：【你的QQ邮箱账号】
    username: 2417424266@qq.com
    # 替换：【你的QQ邮箱SMTP授权码】
    password: txjafsqmmygbecgi
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
