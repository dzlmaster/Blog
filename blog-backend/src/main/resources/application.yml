mail:
  link:
    apply:
      # 邮箱审核友链回调地址（如果不开启）apply-notice 则无需在意该配置，随便填写即可
      redirect-uri: https://43.139.71.86/link/email/apply
  # 是否开启文章邮箱评论提醒
  article-email-notice: true
  # 是否开启文章邮箱回复提醒
  article-reply-notice: false
  # 是否开启留言邮箱评论提醒
  message-email-notice: false
  # 是否开启新的留言提醒
  message-new-notice: true
  # 是否开启留言回复提醒
  message-reply-notice: true
  # 是否开启友链申请提醒（可以在邮箱中通过友链）
  apply-notice: true
  # 是否开启友链审核通知提醒对方
  pass-notice: true
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除
      logic-delete-field: isDeleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
      # id 自增
      id-type: auto

# springdoc-openapi项目配置，访问 http://127.0.0.1:8088/doc.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: xyz.kuailemao

