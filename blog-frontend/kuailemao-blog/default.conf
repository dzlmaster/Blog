# 定义HTTP服务器
    server {
        listen 80;              # 监听端口

        server_name localhost;    # 域名

        location / {
             root   /usr/share/nginx/html;
             index  index.html index.htm;
             try_files $uri $uri/ /index.html =404;
        }

        # 配置代理路径
        location /api/ {
            proxy_pass http://127.0.0.1:8088/;        # 使用 127.0.0.1，配合 --net host 模式
            # 暂时注释掉头部传递，模拟 curl 本地请求，解决后端 500 报错
            # proxy_set_header Host $host;             
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header X-Real-IP $remote_addr; 
        }

        # 配置代理路径
        location /wapi/ {
            proxy_pass http://127.0.0.1:3000/;        
        }

        # 配置错误页面
        error_page 404 /404.html;           # 404错误页
        location = /404.html {
            internal;                       # 不接受外部访问
            root /usr/share/nginx/html;     # 404错误页文件所在目录
        }
    }

    server {
        listen 80;
        server_name blog.ctbu.tech.xyz;

        location / {
            proxy_pass http://ctbu.tech:81/;
            client_max_body_size 100M;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }